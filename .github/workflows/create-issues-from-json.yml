name: Create Issues from JSON
# This workflow creates GitHub issues based on JSON files generated by a Node.js script.

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Generate issue payload files
        run: node js/create_issues.js

      - name: Create issues for each customer
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => /^issue_.*\.json$/.test(f));
            for (const file of files) {
              const payload = JSON.parse(fs.readFileSync(file, 'utf8'));
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: payload.title,
                body: payload.body,
                labels: payload.labels,
                assignees: payload.assignees,
              });
            }
